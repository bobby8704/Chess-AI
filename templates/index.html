<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess AI</title>

  <!-- chessboard.js CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
  />

  <style>
    /* ---------- reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---------- header ---------- */
    header {
      width: 100%;
      text-align: center;
      padding: 24px 16px 12px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.02em;
    }
    header h1 span { color: #4fc3f7; }
    header p {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #9e9e9e;
    }

    /* ---------- layout ---------- */
    .game-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      padding: 16px;
      max-width: 960px;
      width: 100%;
    }

    /* ---------- board wrapper ---------- */
    .board-section { flex: 0 0 auto; }

    #board {
      width: 480px;
      height: 480px;
    }

    /* ---------- move highlights ---------- */
    .highlight-source {
      box-shadow: inset 0 0 0 4px rgba(79, 195, 247, 0.75);
    }
    .highlight-target {
      background: radial-gradient(circle, rgba(79, 195, 247, 0.45) 24%, transparent 25%) !important;
    }
    .highlight-capture {
      background: radial-gradient(circle, transparent 52%, rgba(79, 195, 247, 0.45) 53%, rgba(79, 195, 247, 0.45) 64%, transparent 65%) !important;
    }
    .highlight-last-from {
      box-shadow: inset 0 0 0 4px rgba(255, 235, 59, 0.45);
    }
    .highlight-last-to {
      box-shadow: inset 0 0 0 4px rgba(255, 235, 59, 0.45);
    }

    /* ---------- sidebar ---------- */
    .sidebar {
      flex: 1 1 240px;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ---------- status bar ---------- */
    .status-bar {
      background: #16213e;
      border-radius: 10px;
      padding: 16px 20px;
      text-align: center;
    }
    #status-text {
      font-size: 1.1rem;
      font-weight: 600;
      min-height: 1.4em;
    }
    .status-bar.check   #status-text { color: #ff9800; }
    .status-bar.gameover #status-text { color: #ef5350; }
    .status-bar.playing  #status-text { color: #66bb6a; }
    .status-bar.thinking #status-text { color: #4fc3f7; }

    /* ---------- buttons ---------- */
    .actions { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary  { background: #4fc3f7; color: #1a1a2e; }
    .btn-primary:hover  { background: #81d4fa; }
    .btn-secondary { background: #2d2d44; color: #e0e0e0; }
    .btn-secondary:hover { background: #3a3a55; }

    /* ---------- move list ---------- */
    .move-list-container {
      background: #16213e;
      border-radius: 10px;
      padding: 14px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 200px;
      max-height: 380px;
    }
    .move-list-container h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9e9e9e;
      margin-bottom: 10px;
    }
    #move-list {
      flex: 1;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .move-row { display: flex; gap: 8px; }
    .move-num  { color: #616161; min-width: 30px; text-align: right; }
    .move-white { color: #ffffff; min-width: 60px; }
    .move-black { color: #b0bec5; min-width: 60px; }

    /* ---------- thinking spinner ---------- */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(79,195,247,0.3);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- responsive ---------- */
    @media (max-width: 640px) {
      #board { width: 92vw; height: 92vw; }
      .sidebar { max-width: 92vw; }
      header h1 { font-size: 1.4rem; }
    }

    /* ---------- footer ---------- */
    footer {
      margin-top: auto;
      padding: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: #616161;
    }
  </style>
</head>

<body>
  <header>
    <h1><span>&#9816;</span> Chess AI</h1>
    <p>You play White &mdash; neural-network MCTS plays Black</p>
  </header>

  <div class="game-container">
    <!-- Board -->
    <div class="board-section">
      <div id="board"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="status-bar playing" id="status-bar">
        <div id="status-text">Click "New Game" to start</div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="btn-new" onclick="newGame()">New Game</button>
        <button class="btn btn-secondary" id="btn-undo" onclick="undoMove()" disabled>Undo</button>
      </div>

      <div class="move-list-container">
        <h3>Moves</h3>
        <div id="move-list"></div>
      </div>
    </div>
  </div>

  <footer>
    Powered by MCTS + dual neural network &middot; Built with chessboard.js
  </footer>

  <!-- Libraries -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <script>
    // ===================== State =====================
    let gameId = null;
    let game = new Chess();       // client-side validation
    let board = null;             // chessboard.js instance
    let thinking = false;
    let selectedSquare = null;    // currently highlighted source square
    let lastMove = null;          // {from, to} of last AI move for highlighting

    // ===================== Board config =====================
    const boardConfig = {
      draggable: true,
      position: 'start',
      pieceTheme: '/img/pieces/{piece}.png',
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: onSnapEnd,
      onMouseoutSquare: onMouseoutSquare,
      onMouseoverSquare: onMouseoverSquare,
    };

    board = Chessboard('board', boardConfig);

    // Resize board when window resizes
    $(window).on('resize', () => board.resize());

    // ===================== Highlighting =====================
    function clearHighlights() {
      $('#board .square-55d63').removeClass(
        'highlight-source highlight-target highlight-capture highlight-last-from highlight-last-to'
      );
    }

    function showLastMove() {
      if (!lastMove) return;
      $('#board .square-' + lastMove.from).addClass('highlight-last-from');
      $('#board .square-' + lastMove.to).addClass('highlight-last-to');
    }

    function highlightLegalMoves(square) {
      const moves = game.moves({ square: square, verbose: true });
      if (moves.length === 0) return;

      // Highlight source square
      $('#board .square-' + square).addClass('highlight-source');

      // Highlight each target square
      for (const m of moves) {
        if (m.captured) {
          $('#board .square-' + m.to).addClass('highlight-capture');
        } else {
          $('#board .square-' + m.to).addClass('highlight-target');
        }
      }
    }

    // ===================== Board callbacks =====================
    function onDragStart(source, piece, position, orientation) {
      if (thinking) return false;
      if (game.game_over()) return false;
      // Only allow white pieces (human = white)
      if (piece.search(/^b/) !== -1) return false;
      if (game.turn() !== 'w') return false;

      // Show legal moves for the dragged piece
      clearHighlights();
      highlightLegalMoves(source);
      selectedSquare = source;
    }

    function onDrop(source, target) {
      // Clear highlights
      clearHighlights();
      selectedSquare = null;

      // Try the move client-side first
      const moveObj = game.move({
        from: source,
        to: target,
        promotion: 'q',  // always promote to queen for simplicity
      });

      if (moveObj === null) return 'snapback';

      // Undo client-side — we'll let the server be authoritative
      game.undo();

      // Build UCI string
      let uci = source + target;
      if (moveObj.flags.includes('p')) uci += 'q';

      sendMove(uci);
    }

    function onSnapEnd() {
      board.position(game.fen());
    }

    function onMouseoverSquare(square, piece) {
      // Only show highlights on hover when it's our turn and not thinking
      if (thinking || game.game_over() || game.turn() !== 'w') return;
      if (!piece || piece.search(/^b/) !== -1) return;

      clearHighlights();
      showLastMove();
      highlightLegalMoves(square);
    }

    function onMouseoutSquare(square, piece) {
      clearHighlights();
      showLastMove();
    }

    // ===================== API calls =====================
    async function newGame() {
      thinking = false;
      lastMove = null;
      setStatus('Starting new game...', 'thinking');

      try {
        const res = await fetch('/api/new-game', { method: 'POST' });
        const data = await res.json();
        gameId = data.game_id;
        game = new Chess();
        board.position('start');
        clearHighlights();
        renderMoves([]);
        setStatus("Your turn — drag a white piece", 'playing');
        document.getElementById('btn-undo').disabled = true;
      } catch (err) {
        setStatus('Error starting game', 'gameover');
        console.error(err);
      }
    }

    async function sendMove(uci) {
      if (!gameId) return;
      thinking = true;
      clearHighlights();
      setStatus('<span class="spinner"></span>AI is thinking...', 'thinking');

      try {
        const res = await fetch('/api/move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ game_id: gameId, move: uci }),
        });
        const data = await res.json();

        if (data.error) {
          setStatus(data.error, 'gameover');
          thinking = false;
          return;
        }

        // Sync client game state from server FEN
        game = new Chess(data.fen);
        board.position(data.fen, true);  // animate

        // Track last AI move for highlighting
        if (data.history && data.history.length >= 2) {
          const aiMove = data.history[data.history.length - 1];
          if (aiMove && aiMove.uci) {
            lastMove = {
              from: aiMove.uci.substring(0, 2),
              to: aiMove.uci.substring(2, 4),
            };
            // Show last move highlight after animation completes
            setTimeout(() => {
              clearHighlights();
              showLastMove();
            }, 300);
          }
        }

        // Render move list
        renderMoves(data.history);

        // Update status
        if (data.is_game_over) {
          setStatus(capitalise(data.status), 'gameover');
          document.getElementById('btn-undo').disabled = true;
        } else if (data.status === 'check') {
          setStatus("Check! Your turn", 'check');
        } else {
          setStatus("Your turn", 'playing');
        }

        document.getElementById('btn-undo').disabled = data.is_game_over;
      } catch (err) {
        setStatus('Network error', 'gameover');
        console.error(err);
      }

      thinking = false;
    }

    async function undoMove() {
      if (!gameId || thinking) return;
      alert("Undo is not supported yet. Start a new game instead.");
    }

    // ===================== UI helpers =====================
    function setStatus(html, cls) {
      const bar = document.getElementById('status-bar');
      bar.className = 'status-bar ' + cls;
      document.getElementById('status-text').innerHTML = html;
    }

    function renderMoves(history) {
      const el = document.getElementById('move-list');
      let html = '';
      for (let i = 0; i < history.length; i += 2) {
        const num = Math.floor(i / 2) + 1;
        const white = history[i] ? history[i].san : '';
        const black = history[i + 1] ? history[i + 1].san : '';
        html += `<div class="move-row">
          <span class="move-num">${num}.</span>
          <span class="move-white">${white}</span>
          <span class="move-black">${black}</span>
        </div>`;
      }
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;
    }

    function capitalise(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    // Auto-start a game on load
    newGame();
  </script>
</body>
</html>
